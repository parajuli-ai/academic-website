<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="bSyJzKMpJ-BN9cut8vVKg0BYP34RzY-SA3XZsm7jCX0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="{{ site.author.name }}">

    <!-- Security: meta-tag-enforceable subset for GitHub Pages -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' https://calendar.google.com https://*.disqus.com https://*.disquscdn.com https://cdn.jsdelivr.net;
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://calendar.google.com;
                   font-src 'self' https://fonts.gstatic.com;
                   img-src 'self' https: data:;
                   connect-src 'self' https:;
                   frame-src 'self' https://calendar.google.com https://disqus.com https://*.disqus.com;
                   frame-ancestors 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- Open Graph -->
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/assets/images/profile.jpg' | absolute_url }}">
    <meta property="og:site_name" content="Tilak Parajuli">
    <meta property="og:locale" content="en_US">
    <meta property="profile:first_name" content="Tilak">
    <meta property="profile:last_name" content="Parajuli">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:image" content="{{ '/assets/images/profile.jpg' | absolute_url }}">

    <!-- JSON-LD Structured Data (Pillar 1) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfilePage",
      "mainEntity": {
        "@type": "Person",
        "name": "Tilak Parajuli",
        "givenName": "Tilak",
        "familyName": "Parajuli",
        "jobTitle": "AI/ML Engineer",
        "description": "{{ site.description | strip_newlines | escape }}",
        "url": "{{ site.url }}{{ site.baseurl }}/",
        "image": "{{ '/assets/images/profile.jpg' | absolute_url }}",
        "email": "mailto:{{ site.author.email }}",
        "sameAs": [
          "https://orcid.org/{{ site.author.orcid }}",
          "https://scholar.google.com/citations?user={{ site.author.google_scholar }}",
          "https://github.com/{{ site.author.github }}",
          "https://www.linkedin.com/in/tilak-parajuli-777411179"
        ],
        "alumniOf": {
          "@type": "EducationalOrganization",
          "name": "Tribhuvan University",
          "department": "Bhaktapur Multiple Campus",
          "url": "https://tu.edu.np/"
        },
        "hasCredential": [
          {
            "@type": "EducationalOccupationalCredential",
            "credentialCategory": "degree",
            "name": "Bachelor of Science in Computer Science and Information Technology",
            "recognizedBy": {
              "@type": "EducationalOrganization",
              "name": "Tribhuvan University"
            }
          },
          {
            "@type": "EducationalOccupationalCredential",
            "credentialCategory": "certificate",
            "name": "AI Fellow, Microdegree in Artificial Intelligence",
            "recognizedBy": {
              "@type": "Organization",
              "name": "Fusemachines"
            }
          }
        ],
        "knowsAbout": [
          "Large Language Models",
          "Retrieval-Augmented Generation",
          "Multi-Agent Systems",
          "Computational Biology",
          "Computer Vision",
          "Data Engineering"
        ],
        "worksFor": {
          "@type": "Organization",
          "name": "Climate Clean Solutions & LowPropTax"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Kathmandu",
          "addressCountry": "NP"
        }
      }
    }
    </script>

    <!-- WebSite schema: tells Google the site name to show in results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Tilak Parajuli",
      "url": "{{ site.url }}{{ site.baseurl }}/"
    }
    </script>

    <!-- SEO (jekyll-seo-tag) -->
    {% seo %}

    <!-- Performance: Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Fonts: Inter (body) + JetBrains Mono (code) -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
          media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    </noscript>


    <!-- CSS (preloaded then applied) -->
    <link rel="preload" href="{{ '/assets/css/main.css' | relative_url }}" as="style">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

    <!-- Favicon -->
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" sizes="any">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

    <!-- RSS Feed -->
    {% feed_meta %}

    <!-- Canonical URL -->
    <link rel="canonical" href="{{ page.url | absolute_url }}">

    {% if page.math %}
    <!-- Math rendering: MathJax 3 (SVG output). Loaded only on pages with `math: true`.
         kramdown protects $$...$$ and emits \(...\) inline and \[...\] for display. -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)']],
          displayMath: [['\\[', '\\]'], ['$$', '$$']],
          processEscapes: true
        },
        options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] },
        svg: { fontCache: 'global' }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>
    {% endif %}
</head>
<body>
    <a href="#main-content" class="sr-only">Skip to main content</a>
    
    <header class="site-header">
        {% include navigation.html %}
    </header>
    
    <main id="main-content" class="container">
        {{ content }}
    </main>
    
    <footer>
        {% include footer.html %}
    </footer>

    {% unless page.url contains '/contact' %}
    <a class="fab-contact" href="{{ '/contact/' | relative_url }}" aria-label="Get in touch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        <span>Get in touch</span>
    </a>
    {% endunless %}

    <!-- JavaScript -->
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
