  twitter: ""

# Build Settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  pages:
    output: true
    permalink: /:name

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Tilak Parajuli"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Navigation
navigation:
  - title: Work
    url: /work
  - title: Blog
    url: /blog
  - title: CV
    url: /cv
  - title: Contact
    url: /contact

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - BACKEND_COMPLETE.md
  - CHANGELOG.md
  - COMPLETE_OVERVIEW.md
  - DEPLOYMENT_GUIDE.md
  - DESIGN_RESEARCH.md
  - FILE_LISTING.md
  - NAVBAR_FIX.md
  - PROJECT_STRUCTURE.md
  - PROJECT_SUMMARY.md
  - QUICK_START.md
  - SETUP_CHECKLIST.md
  - START_HERE.md
  - backend/
  - google2b6730afec9dbd8c.html

sitemap:
  exclude:
    - /backend/**/*
    - /assets/images/**/*
    - /assets/tilak-parajuli-cv.pdf
    - /google2b6730afec9dbd8c.html
